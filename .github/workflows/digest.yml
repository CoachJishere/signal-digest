name: Gimme Gimme

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      config:
        description: 'Config file to run (e.g., config-ai.json), or leave empty for all'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}
        run: |
          CONFIG="${{ github.event.inputs.config }}"
          if [ -n "$CONFIG" ]; then
            python -m gimme_gimme.main --run "configs/$CONFIG"
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python -m gimme_gimme.main --run configs/config-mysterymaker.json
          else
            python -m gimme_gimme.main --run-all
          fi

      - name: Commit seen_topics updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_topics.json
          git diff --staged --quiet || (git stash && git pull --rebase && git stash pop && git add data/seen_topics.json && git commit -m "Update seen_topics.json" && git push)
